<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | User Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen p-6 md:p-12">

    <div class="max-w-6xl mx-auto space-y-8">

        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">User Management</h1>
                <p class="text-sm text-gray-500 mt-1">Monitor active users and manage account permissions.</p>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="border-b-2 border-gray-100">
                        <th class="py-4 px-2 text-sm font-semibold text-gray-600">Full Name</th>
                        <th class="py-4 px-2 text-sm font-semibold text-gray-600">Email Address</th>
                        <th class="py-4 px-2 text-sm font-semibold text-gray-600">Status</th>
                        <th class="py-4 px-2 text-sm font-semibold text-gray-600 text-right">Actions</th>
                    </tr>
                </thead>

                <tbody class="divide-y divide-gray-100">
                            {% for user in users %}
                            <tr class="hover:bg-gray-50 transition-colors">
                                <td class="py-4 px-2 text-sm font-medium text-gray-900">{{ user.user_name }}</td>
                                <td class="py-4 px-2 text-sm text-gray-500">{{ user.user_email }}</td>
                                {% if user.is_active == True %}
                                <td class="py-4 px-2 text-sm">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-100">
                                        Active
                                    </span>
                                </td>

                                <td class="py-4 px-2 text-sm text-right">
                                    <form action="{{ url_for('admin_bp.active_deactivate', user_id = user.user_id) }}" method="post">
                                        <button class="text-red-600 hover:text-red-700 font-medium hover:underline text-sm transition-colors">
                                            Deactivate
                                        </button>
                                    </form>
                                </td>

                                {% else %}
                                <td class="py-4 px-2 text-sm">
                                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-600 border border-gray-200">
                                        Not Active
                                    </span>
                                </td>

                                <td class="py-4 px-2 text-sm text-right">
                                    <form action="{{ url_for('admin_bp.active_deactivate', user_id = user.user_id) }}" method="post">
                                        <button class="text-emerald-600 hover:text-emerald-700 font-medium hover:underline text-sm transition-colors">
                                            Activate
                                        </button>
                                    </form>
                                </td>
                                {% endif %}

                            </tr>
                            {% endfor %}
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
