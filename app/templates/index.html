<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white min-h-screen flex">

    <div class="hidden lg:flex lg:w-1/2 bg-gradient-to-tr from-indigo-600 to-blue-500 items-center justify-center p-12 text-white">
        <div class="max-w-md">
            <h1 class="text-4xl font-bold mb-4">Welcome Back!</h1>
            <p class="text-indigo-100 text-lg">Sign in to continue accessing your dashboard.</p>
        </div>
    </div>



    <div class="w-full lg:w-1/2 flex items-center justify-center p-8 sm:p-12 md:p-20">
        <div class="w-full max-w-md space-y-8">

            <div>
                <h2 class="text-3xl font-bold text-gray-900">Sign In</h2>
                <p class="text-sm text-gray-500 mt-2">Please enter your details to log in.</p>
            </div>

            <form class="space-y-6" method="post" action="{{ url_for('user_bp.login_page') }}">

                <div>
                    <label class="text-sm font-medium text-gray-700 block mb-1">Full Name</label>
                    <input type="text" placeholder="John Doe" name="user_name"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm text-gray-900">
                </div>

                <div>
                    <div class="flex justify-between mb-1">
                        <label class="text-sm font-medium text-gray-700" >Email Address</label>
                    </div>
                    <input type="email" placeholder="user_name@gmail.com" name="user_email"
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-100 outline-none transition-all text-sm text-gray-900">
                </div>

                <div class="flex items-center">
                    <input id="remember" type="checkbox" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember" class="ml-2 block text-sm text-gray-700">Remember me</label>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors shadow-md shadow-blue-200">
                    Sign In
                </button>
            </form>
        </div>
    </div>

</body>
</html>
